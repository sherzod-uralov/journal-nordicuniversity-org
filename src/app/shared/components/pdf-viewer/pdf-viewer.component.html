@if (isBrowser) {
  <div class="pdf-embed-wrapper">
    <object
      [data]="safeSrc()"
      type="application/pdf"
      class="pdf-object"
      aria-label="PDF document"
    >
      <div class="pdf-fallback">
        <svg class="w-10 h-10 text-lavender" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
        </svg>
        <span class="text-sm text-dusk">{{ 'article.pdf_error' | translate }}</span>
        <a [href]="src()" target="_blank" rel="noopener noreferrer" class="pdf-fallback-link" aria-label="Download PDF">
          {{ 'article.download' | translate }}
        </a>
      </div>
    </object>
  </div>
} @else {
  <div class="pdf-ssr-placeholder">
    <svg class="w-8 h-8 text-lavender" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
    </svg>
    <span class="text-sm text-lavender">PDF</span>
  </div>
}
