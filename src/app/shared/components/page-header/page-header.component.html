<div class="page-hero">
  <!-- Background pattern -->
  <div class="page-hero-pattern"></div>

  <!-- Breadcrumb -->
  <div class="page-hero-breadcrumb">
    <app-breadcrumb [items]="breadcrumbs()" class="breadcrumb-light" />
  </div>

  <!-- Title -->
  @if (titleKey() || title()) {
    <h1 class="page-hero-title font-heading">
      @if (titleKey()) {
        {{ titleKey()! | translate }}
      } @else {
        {{ title() }}
      }
    </h1>
  }

  <!-- Projected content -->
  <div class="page-hero-content">
    <ng-content />
  </div>

  <!-- Layered waves -->
  <svg class="page-hero-wave" viewBox="0 0 1440 150" preserveAspectRatio="none" fill="none">
    <path class="wave-1" d="M0 150V60C160 20 320 50 480 65C640 80 800 30 960 15C1120 0 1280 45 1440 55V150H0Z"/>
    <path class="wave-2" d="M0 150V75C200 40 400 70 600 80C800 90 1000 35 1200 30C1350 27 1420 55 1440 65V150H0Z"/>
    <path class="wave-3" d="M0 150V90C240 55 480 75 720 90C960 105 1200 70 1440 75V150H0Z"/>
  </svg>
</div>
