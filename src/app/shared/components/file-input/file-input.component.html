@if (!file()) {
  <!-- Drop zone -->
  <div
    class="drop-zone"
    [class.dragging]="isDragging()"
    [class.disabled]="isDisabled()"
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave($event)"
    (drop)="onDrop($event)"
    (click)="fileRef.click()"
  >
    <div class="drop-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
    </div>
    <div class="drop-text">
      <span class="drop-action">{{ label() }}</span>
      <span class="drop-hint">or drag and drop</span>
    </div>
    @if (acceptHint || hint()) {
      <p class="drop-accept">{{ hint() || acceptHint }} &middot; Max {{ maxSize() }}MB</p>
    }
  </div>
} @else {
  <!-- File preview -->
  <div class="file-preview">
    <div class="file-icon" [attr.data-type]="fileIcon">
      @switch (fileIcon) {
        @case ('pdf') {
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10 9 9 9 8 9"/>
          </svg>
        }
        @case ('image') {
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
        }
        @default {
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
        }
      }
    </div>
    <div class="file-info">
      <p class="file-name">{{ fileName }}</p>
      <p class="file-size">{{ fileSize }}</p>
    </div>
    <button type="button" class="file-remove" (click)="remove()" [disabled]="isDisabled()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>
}

@if (error()) {
  <p class="file-error">{{ error() }}</p>
}

<input
  #fileRef
  type="file"
  [accept]="accept()"
  [disabled]="isDisabled()"
  (change)="onFileChange($event)"
  class="hidden"
/>
