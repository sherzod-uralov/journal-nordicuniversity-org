@if (visible()) {
  <button
    (click)="scrollToTop()"
    class="scroll-to-top"
    aria-label="Scroll to top"
  >
    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 15.75l7.5-7.5 7.5 7.5"/>
    </svg>
  </button>
}
