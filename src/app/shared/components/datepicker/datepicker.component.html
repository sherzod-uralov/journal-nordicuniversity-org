<div class="dp-wrapper">
  <div
    class="dp-input"
    [class.dp-input--open]="isOpen()"
    [class.dp-input--disabled]="isDisabled()"
    tabindex="0"
    role="combobox"
    [attr.aria-expanded]="isOpen()"
    (click)="toggle()"
    (keydown.enter)="toggle()"
    (keydown.space)="toggle(); $event.preventDefault()"
  >
    <svg class="dp-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5"/>
    </svg>
    <span class="dp-value" [class.dp-placeholder]="!displayValue()">
      {{ displayValue() || placeholder() }}
    </span>
    @if (displayValue()) {
      <button
        class="dp-clear"
        type="button"
        (click)="clear($event)"
        aria-label="Clear date"
      >
        <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    }
  </div>

  @if (isOpen()) {
    <div
      class="dp-panel"
      [style.top.px]="panelPos().top"
      [style.left.px]="panelPos().left"
      [style.width.px]="panelPos().width"
    >
      <div class="dp-header">
        <button class="dp-nav" type="button" (click)="prevMonth(); $event.stopPropagation()" aria-label="Previous month">
          <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/>
          </svg>
        </button>
        <span class="dp-month-label">{{ monthLabel() }}</span>
        <button class="dp-nav" type="button" (click)="nextMonth(); $event.stopPropagation()" aria-label="Next month">
          <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/>
          </svg>
        </button>
      </div>

      <div class="dp-weekdays">
        @for (d of DAYS; track d) {
          <span>{{ d }}</span>
        }
      </div>

      <div class="dp-grid">
        @for (week of weeks(); track $index) {
          @for (day of week; track day.date.getTime()) {
            <button
              class="dp-day"
              type="button"
              [class.dp-day--other]="!day.currentMonth"
              [class.dp-day--today]="day.today"
              [class.dp-day--selected]="day.selected"
              [disabled]="day.disabled"
              (click)="pick(day); $event.stopPropagation()"
            >
              {{ day.day }}
            </button>
          }
        }
      </div>

      <button class="dp-today" type="button" (click)="goToday(); $event.stopPropagation()">
        Today
      </button>
    </div>
  }
</div>
