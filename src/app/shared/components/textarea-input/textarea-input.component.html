<textarea
  [id]="fieldId()"
  [value]="value()"
  [placeholder]="placeholder()"
  [rows]="rows()"
  [attr.maxlength]="maxlength()"
  [disabled]="isDisabled()"
  [attr.aria-describedby]="fieldId() ? fieldId() + '-error' : null"
  (input)="onInput($event)"
  (blur)="onBlur()"
  class="input-base"
></textarea>
