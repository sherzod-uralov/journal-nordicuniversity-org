<div class="select-wrapper" (appClickOutside)="closeDropdown()">
  <button
    type="button"
    [id]="fieldId()"
    class="select-trigger"
    [class.placeholder]="value() == null"
    [disabled]="isDisabled()"
    (click)="toggleDropdown()"
    [attr.aria-expanded]="dropdownOpen()"
    aria-haspopup="listbox"
  >
    <span class="select-label">{{ displayLabel || placeholder() }}</span>
    <svg class="chevron" [class.open]="dropdownOpen()" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
      <path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z" clip-rule="evenodd"/>
    </svg>
  </button>

  @if (dropdownOpen()) {
    <div class="dropdown">
      @if (filter()) {
        <div class="dropdown-search">
          <input
            type="text"
            [ngModel]="searchQuery()"
            (ngModelChange)="searchQuery.set($event)"
            placeholder="Search..."
            class="search-input"
          />
        </div>
      }
      <div class="dropdown-list" role="listbox">
        @for (option of filteredOptions; track getOptionValue(option)) {
          <button
            type="button"
            class="dropdown-item"
            role="option"
            [attr.aria-selected]="getOptionValue(option) === value()"
            [class.active]="getOptionValue(option) === value()"
            (click)="selectOption(option)"
          >
            @if (itemTpl()) {
              <ng-container *ngTemplateOutlet="itemTpl()!; context: { $implicit: option }" />
            } @else {
              {{ getOptionLabel(option) }}
            }
          </button>
        }
        @if (filteredOptions.length === 0) {
          <div class="dropdown-empty">No options found</div>
        }
      </div>
    </div>
  }
</div>
