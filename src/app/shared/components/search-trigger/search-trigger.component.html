<button
  (click)="open()"
  class="search-trigger"
  type="button"
  aria-label="Search (Ctrl+K)"
>
  <svg class="w-3.5 h-3.5 opacity-60" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
    <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
  </svg>
  <span class="text-sm">{{ 'search.trigger' | translate }}</span>
  <kbd class="search-trigger-kbd hidden sm:inline-flex">
    {{ isMac() ? '⌘' : 'Ctrl+' }}K
  </kbd>
</button>
