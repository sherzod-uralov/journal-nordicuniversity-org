<div class="form-field" [class.has-error]="!!error()">
  @if (label()) {
    <label [for]="fieldId()" class="form-label">
      {{ label() }}
      @if (required()) { <span class="text-red-500 ml-0.5">*</span> }
    </label>
  }
  <div class="form-input-wrapper">
    <ng-content />
  </div>
  <div class="form-message-slot">
    @if (error()) {
      <p class="form-error">
        <svg class="w-3 h-3 shrink-0 mt-px" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/>
        </svg>
        {{ error() | translate }}
      </p>
    } @else if (hint()) {
      <p class="form-hint">{{ hint() | translate }}</p>
    }
  </div>
</div>
