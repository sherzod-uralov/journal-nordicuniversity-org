<div
  class="img-wrap"
  [style.aspect-ratio]="ratio() || null"
  [style.border-radius]="rounded() || null"
>
  <!-- Skeleton placeholder -->
  @if (!loaded()) {
    <div class="img-skeleton" aria-hidden="true">
      <div class="img-skeleton-shimmer"></div>
    </div>
  }

  <!-- Actual image -->
  @if (shouldLoad() && !error()) {
    <img
      [src]="resolvedSrc()"
      [alt]="alt()"
      [class]="'img-el ' + imgClass()"
      [style.object-fit]="fit()"
      [loading]="priority() ? 'eager' : 'lazy'"
      [attr.fetchpriority]="priority() ? 'high' : null"
      [attr.decoding]="priority() ? null : 'async'"
      [class.img-el--loaded]="loaded()"
      (load)="onLoad()"
      (error)="onError()"
    />
  }

  <!-- Error fallback -->
  @if (error()) {
    <div class="img-error" aria-hidden="true">
      <svg class="img-error-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="m2.25 15.75 5.159-5.159a2.25 2.25 0 0 1 3.182 0l5.159 5.159m-1.5-1.5 1.409-1.409a2.25 2.25 0 0 1 3.182 0l2.909 2.909M3.75 21h16.5A2.25 2.25 0 0 0 22.5 18.75V5.25A2.25 2.25 0 0 0 20.25 3H3.75A2.25 2.25 0 0 0 1.5 5.25v13.5A2.25 2.25 0 0 0 3.75 21Z"/>
      </svg>
    </div>
  }
</div>
