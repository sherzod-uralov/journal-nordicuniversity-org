<app-page-header [breadcrumbs]="breadcrumbs" titleKey="bookmarks.title" />

<section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
  @if (bookmarkStore.count() > 0) {
    <div class="flex items-center justify-between mb-6">
      <p class="text-sm text-dusk">
        {{ bookmarkStore.count() }} {{ 'bookmarks.count' | translate }}
      </p>
      <button
        (click)="clearAll()"
        class="text-sm text-red-500 hover:text-red-600 transition-colors cursor-pointer"
        aria-label="Clear all bookmarks"
      >
        {{ 'bookmarks.clear_all' | translate }}
      </button>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
      @for (article of bookmarkStore.bookmarks(); track article.id) {
        <app-article-card [article]="article" />
      }
    </div>
  } @else {
    <app-empty-state
      [title]="'bookmarks.empty' | translate"
      [message]="'bookmarks.empty_desc' | translate"
    />
  }
</section>
