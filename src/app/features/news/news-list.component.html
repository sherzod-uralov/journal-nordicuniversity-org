<app-page-header [breadcrumbs]="breadcrumbs" [titleKey]="'news.title'" />

<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-8">

  @if (newsStore.loading()) {
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      @for (i of [1,2,3,4,5,6]; track i) { <p-skeleton height="200px" borderRadius="12px" /> }
    </div>
  } @else {
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      @for (news of newsStore.newsList(); track news.id) {
        <app-news-card [news]="news" />
      }
    </div>
    @if (newsStore.totalPages() > 1) {
      <div class="mt-8">
        <p-paginator [first]="first" [rows]="12" [totalRecords]="newsStore.totalCount()" (onPageChange)="onPageChange($event)" />
      </div>
    }
  }
</div>
