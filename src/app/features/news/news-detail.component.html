@if (newsStore.loading()) {
  <app-page-header [breadcrumbs]="breadcrumbs()" title="..." />
  <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="space-y-4">
      <p-skeleton height="1.75rem" />
      <p-skeleton width="100%" height="16rem" borderRadius="8px" />
      <p-skeleton height="1rem" />
      <p-skeleton width="75%" height="1rem" />
    </div>
  </div>
} @else if (newsStore.selectedNews(); as news) {
  <app-page-header [breadcrumbs]="breadcrumbs()" [title]="news.title" />

  <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <article>
      <span class="text-sm text-lavender">{{ news.time | dateLocale:'long' }}</span>

      @if (news.source?.file_path) {
        <div class="mt-6 mb-8">
          <app-image [src]="news.source!.file_path" [alt]="news.title" [priority]="true" rounded="0.75rem" />
        </div>
      }

      <div class="prose prose-slate max-w-none text-dusk leading-relaxed" [innerHTML]="news.body | safeHtml"></div>
    </article>
  </div>
}
