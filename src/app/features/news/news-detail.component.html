<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
  <app-breadcrumb [items]="breadcrumbs" />

  @if (newsStore.loading()) {
    <div class="mt-8 space-y-4">
      <p-skeleton height="1.75rem" />
      <p-skeleton width="100%" height="16rem" borderRadius="8px" />
      <p-skeleton height="1rem" /><p-skeleton width="75%" height="1rem" />
    </div>
  } @else if (newsStore.selectedNews(); as news) {
    <article class="mt-6">
      <span class="text-sm text-lavender">{{ news.createdAt | dateLocale:'long' }}</span>
      <h1 class="font-heading text-3xl sm:text-4xl font-bold text-ink mt-2 mb-6 leading-tight">
        {{ news | localize:'news_title' }}
      </h1>

      @if (news.source?.file_path) {
        <img [src]="news.source!.file_path | fileUrl" [alt]="news | localize:'news_title'" class="w-full rounded-xl mb-8 shadow-sm" />
      }

      <div class="prose prose-slate max-w-none text-dusk leading-relaxed" [innerHTML]="news | localize:'news_body' | safeHtml"></div>
    </article>
  }
</div>
