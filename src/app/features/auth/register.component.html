<div class="min-h-[80vh] flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-[480px]">
    <!-- Header -->
    <div class="text-center mb-10">
      <h1 class="font-heading text-3xl font-bold text-ink mb-2">{{ 'auth.register.title' | translate }}</h1>
      <p class="text-sm text-lavender">{{ 'auth.register.has_account' | translate }}
        <a routerLink="/auth/login" class="text-dusk font-semibold hover:text-ink transition-colors">{{ 'nav.login' | translate }}</a>
      </p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-xl shadow-ink/5 border border-alabaster/40 p-8">
      <form (ngSubmit)="register()" class="space-y-5">
        <div class="text-center mb-2">
          <div class="w-12 h-12 bg-dusk/10 rounded-xl flex items-center justify-center mx-auto mb-3">
            <i class="pi pi-user text-xl text-dusk"></i>
          </div>
          <h2 class="text-lg font-semibold text-ink mb-1">{{ 'auth.register.title' | translate }}</h2>
        </div>

        <div>
          <label class="block text-sm font-medium text-ink mb-1.5">{{ 'auth.register.phone' | translate }} <span class="text-red-500" aria-hidden="true">*</span></label>
          <app-phone-input [(ngModel)]="phone" name="phone" />
        </div>

        <div>
          <label class="block text-sm font-medium text-ink mb-1.5">{{ 'auth.register.name' | translate }} <span class="text-red-500" aria-hidden="true">*</span></label>
          <app-text-input [(ngModel)]="full_name" name="name" />
        </div>

        <div>
          <label class="block text-sm font-medium text-ink mb-1.5">{{ 'auth.register.password' | translate }} <span class="text-red-500" aria-hidden="true">*</span></label>
          <app-password-input [(ngModel)]="password" name="password" />
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-ink mb-1.5">{{ 'auth.register.degree' | translate }} <span class="text-red-500" aria-hidden="true">*</span></label>
            <app-text-input [(ngModel)]="science_degree" name="degree" />
          </div>
          <div>
            <label class="block text-sm font-medium text-ink mb-1.5">{{ 'auth.register.job' | translate }} <span class="text-red-500" aria-hidden="true">*</span></label>
            <app-text-input [(ngModel)]="job" name="job" />
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-ink mb-1.5">{{ 'auth.register.position' | translate }} <span class="text-red-500" aria-hidden="true">*</span></label>
            <app-text-input [(ngModel)]="place_position" name="position" />
          </div>
          <div>
            <label class="block text-sm font-medium text-ink mb-1.5">{{ 'auth.register.birthday' | translate }} <span class="text-red-500" aria-hidden="true">*</span></label>
            <app-date-input [(ngModel)]="birthdayDate" name="birthday" [maxDate]="maxDate" />
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-ink mb-1.5">{{ 'auth.register.orcid' | translate }}</label>
          <app-text-input [(ngModel)]="OrcID" name="orcid" placeholder="0000-0000-0000-0000" />
        </div>

        <p-button
          type="submit"
          [label]="'auth.register.submit' | translate"
          styleClass="w-full"
          [loading]="loading()"
          icon="pi pi-check"
        />
      </form>
    </div>
  </div>
</div>
